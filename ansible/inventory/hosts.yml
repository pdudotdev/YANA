---
# YANA lab inventory — NETCONF targets for OSPF QA tests.
# Credentials from environment variables (loaded from .env).

all:
  vars:
    ansible_python_interpreter: /home/mcp/yana/yana/bin/python3
    ansible_user: "{{ lookup('ansible.builtin.env', 'ROUTER_USERNAME') }}"
    ansible_password: "{{ lookup('ansible.builtin.env', 'ROUTER_PASSWORD') }}"
  children:
    ios:
      vars:
        ansible_netconf_ncclient_device_handler: iosxe
      hosts:
        E1C:
          ansible_host: 172.20.20.209
          ansible_connection: ansible.netcommon.netconf
          ansible_port: 830
          ansible_netconf_host_key_checking: false
          cli_style: ios
          vrf: VRF1

    junos:
      vars:
        ansible_netconf_ncclient_device_handler: junos
        ansible_user: "{{ lookup('ansible.builtin.env', 'ROUTER_USERNAME') }}"
        ansible_password: "{{ lookup('ansible.builtin.env', 'ROUTER_PASSWORD_JUNOS') }}"
      hosts:
        C1J:
          ansible_host: 172.20.20.207
          ansible_connection: ansible.netcommon.netconf
          ansible_port: 830
          ansible_netconf_host_key_checking: false
          cli_style: junos
          vrf: VRF1
