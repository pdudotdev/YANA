---
# YANA lab inventory — NETCONF targets for OSPF QA tests.
# Credentials pulled from HashiCorp Vault (KV v2, path: yana/router).
# Requires VAULT_ADDR and VAULT_TOKEN env vars to be set.

all:
  vars:
    ansible_python_interpreter: /home/mcp/yana/yana/bin/python3
    ansible_user: "{{ lookup('community.hashi_vault.vault_kv2_get', 'yana/router', engine_mount_point='secret').secret.username }}"
    ansible_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'yana/router', engine_mount_point='secret').secret.password }}"
  children:
    ios:
      vars:
        ansible_netconf_ncclient_device_handler: iosxe
      hosts:
        E1C:
          ansible_host: 172.20.20.209
          ansible_connection: ansible.netcommon.netconf
          ansible_port: 830
          ansible_netconf_host_key_checking: false
          cli_style: ios
          vrf: VRF1

    junos:
      vars:
        ansible_netconf_ncclient_device_handler: junos
      hosts:
        C1J:
          ansible_host: 172.20.20.207
          ansible_connection: ansible.netcommon.netconf
          ansible_port: 830
          ansible_netconf_host_key_checking: false
          cli_style: junos
          vrf: VRF1
